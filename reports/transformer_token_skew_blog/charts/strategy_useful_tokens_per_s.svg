<svg xmlns="http://www.w3.org/2000/svg" width="860" height="360" viewBox="0 0 860 360">
<style>
text { font-family: Arial, sans-serif; fill: #17212b; }
.title { font-size: 22px; font-weight: 700; }
.label { font-size: 14px; }
.value { font-size: 14px; font-weight: 700; }
</style>
<rect width="860" height="360" fill="#ffffff" />
<text x="240" y="32" class="title">Variable-Length Transformer: Useful Token Throughput</text>
<line x1="240.0" y1="50" x2="240.0" y2="296" stroke="#e2e8f0" />
<text x="240.0" y="320" text-anchor="middle" class="label">0</text>
<line x1="380.0" y1="50" x2="380.0" y2="296" stroke="#e2e8f0" />
<text x="380.0" y="320" text-anchor="middle" class="label">62740</text>
<line x1="520.0" y1="50" x2="520.0" y2="296" stroke="#e2e8f0" />
<text x="520.0" y="320" text-anchor="middle" class="label">125480</text>
<line x1="660.0" y1="50" x2="660.0" y2="296" stroke="#e2e8f0" />
<text x="660.0" y="320" text-anchor="middle" class="label">188220</text>
<line x1="800.0" y1="50" x2="800.0" y2="296" stroke="#e2e8f0" />
<text x="800.0" y="320" text-anchor="middle" class="label">250959</text>
<text x="230" y="84.0" text-anchor="end" class="label">Uniform lengths</text>
<rect x="240" y="56.0" width="560.0" height="48.0" rx="6" fill="#2563eb" />
<text x="808.0" y="84.0" class="value">250959 tokens/s</text>
<text x="230" y="148.0" text-anchor="end" class="label">Variable lengths + fixed batch</text>
<rect x="240" y="120.0" width="272.2" height="48.0" rx="6" fill="#2563eb" />
<text x="520.2" y="148.0" class="value">122006 tokens/s</text>
<text x="230" y="212.0" text-anchor="end" class="label">Variable lengths + bucketing</text>
<rect x="240" y="184.0" width="465.6" height="48.0" rx="6" fill="#2563eb" />
<text x="713.6" y="212.0" class="value">208668 tokens/s</text>
<text x="230" y="276.0" text-anchor="end" class="label">Variable lengths + token budget</text>
<rect x="240" y="248.0" width="431.3" height="48.0" rx="6" fill="#2563eb" />
<text x="679.3" y="276.0" class="value">193289 tokens/s</text>
</svg>
