<svg xmlns="http://www.w3.org/2000/svg" width="820" height="360" viewBox="0 0 820 360">
<style>
text { font-family: Arial, sans-serif; fill: #17212b; }
.title { font-size: 22px; font-weight: 700; }
.label { font-size: 14px; }
.value { font-size: 14px; font-weight: 700; }
.axis { stroke: #94a3b8; stroke-width: 1; }
</style>
<rect width="820" height="360" fill="#ffffff" />
<text x="220" y="30" class="title">Pathology Sweep: Global Throughput</text>
<line x1="220" y1="300" x2="760" y2="300" class="axis" />
<text x="208" y="83.8" text-anchor="end" class="label">Baseline</text>
<rect x="220" y="54.0" width="540.0" height="49.5" rx="6" fill="#ea580c" />
<text x="768.0" y="83.8" class="value">7289 samples/s</text>
<text x="208" y="149.2" text-anchor="end" class="label">Straggler</text>
<rect x="220" y="119.5" width="369.9" height="49.5" rx="6" fill="#ea580c" />
<text x="597.9" y="149.2" class="value">4993 samples/s</text>
<text x="208" y="214.8" text-anchor="end" class="label">Extra all-reduce</text>
<rect x="220" y="185.0" width="139.7" height="49.5" rx="6" fill="#ea580c" />
<text x="367.7" y="214.8" class="value">1886 samples/s</text>
<text x="208" y="280.2" text-anchor="end" class="label">Rank-0 work + barrier</text>
<rect x="220" y="250.5" width="425.4" height="49.5" rx="6" fill="#ea580c" />
<text x="653.4" y="280.2" class="value">5742 samples/s</text>
<line x1="220.0" y1="46" x2="220.0" y2="300" stroke="#e2e8f0" />
<text x="220.0" y="324" text-anchor="middle" class="label">0</text>
<line x1="355.0" y1="46" x2="355.0" y2="300" stroke="#e2e8f0" />
<text x="355.0" y="324" text-anchor="middle" class="label">1822</text>
<line x1="490.0" y1="46" x2="490.0" y2="300" stroke="#e2e8f0" />
<text x="490.0" y="324" text-anchor="middle" class="label">3645</text>
<line x1="625.0" y1="46" x2="625.0" y2="300" stroke="#e2e8f0" />
<text x="625.0" y="324" text-anchor="middle" class="label">5467</text>
<line x1="760.0" y1="46" x2="760.0" y2="300" stroke="#e2e8f0" />
