<svg xmlns="http://www.w3.org/2000/svg" width="760" height="340" viewBox="0 0 760 340">
<style>
text { font-family: Arial, sans-serif; fill: #1f2933; }
.title { font-size: 22px; font-weight: 700; }
.label { font-size: 14px; }
.value { font-size: 14px; font-weight: 700; }
.axis { stroke: #94a3b8; stroke-width: 1; }
</style>
<rect width="760" height="340" fill="#ffffff" />
<text x="180" y="28" class="title">Kernel-Bound fp32 vs bf16</text>
<line x1="180" y1="280" x2="720" y2="280" class="axis" />
<text x="168" y="108.0" text-anchor="end" class="label">Kernel-bound fp32</text>
<rect x="180" y="50.0" width="518.8" height="106.0" rx="6" fill="#3a86ff" />
<text x="706.8" y="108.0" class="value">4.5 ms</text>
<text x="168" y="232.0" text-anchor="end" class="label">Kernel-bound bf16</text>
<rect x="180" y="174.0" width="540.0" height="106.0" rx="6" fill="#3a86ff" />
<text x="728.0" y="232.0" class="value">4.7 ms</text>
<line x1="180.0" y1="42" x2="180.0" y2="280" stroke="#e2e8f0" />
<text x="180.0" y="304" text-anchor="middle" class="label">0</text>
<line x1="315.0" y1="42" x2="315.0" y2="280" stroke="#e2e8f0" />
<text x="315.0" y="304" text-anchor="middle" class="label">1</text>
<line x1="450.0" y1="42" x2="450.0" y2="280" stroke="#e2e8f0" />
<text x="450.0" y="304" text-anchor="middle" class="label">2</text>
<line x1="585.0" y1="42" x2="585.0" y2="280" stroke="#e2e8f0" />
<text x="585.0" y="304" text-anchor="middle" class="label">4</text>
<line x1="720.0" y1="42" x2="720.0" y2="280" stroke="#e2e8f0" />
<text x="720.0" y="304" text-anchor="middle" class="label">5</text>
</svg>
